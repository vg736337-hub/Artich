
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Artich Optimizer</title>
    <style>
        :root {
            --bg: #050505; --sidebar: #0a0a0a; --cont: #0d0d0d;
            --text: #ffffff; --accent: #ffffff; --border: 1px solid #222;
        }
        /* ТЕМЫ */
        body.cyber-theme { --bg: #050005; --sidebar: #100010; --cont: #150015; --text: #00f2ff; --accent: #ff007a; --border: 1px solid #ff007a; }
        body.white-theme { --bg: #f0f0f0; --sidebar: #e0e0e0; --cont: #ffffff; --text: #000000; --accent: #000000; --border: 1px solid #ccc; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; transition: 0.3s; }

        .sidebar { width: 250px; background: var(--sidebar); border-right: var(--border); display: flex; flex-direction: column; padding: 40px 0; }
        .sidebar h2 { text-align: center; letter-spacing: 8px; font-weight: 900; margin-bottom: 50px; color: var(--text); }
        .nav-btn { background: none; border: none; color: var(--text); opacity: 0.5; padding: 15px 30px; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: 800; transition: 0.3s; }
        .nav-btn:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .nav-btn.active { opacity: 1; border-left: 3px solid var(--accent); background: rgba(255,255,255,0.05); }

        .main { flex: 1; background: var(--cont); padding: 50px; display: flex; flex-direction: column; overflow-y: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 24px; margin-bottom: 20px; font-weight: 900; text-transform: uppercase; }
        p { color: var(--text); opacity: 0.7; margin-bottom: 20px; }

        .btn-list { display: flex; flex-direction: column; gap: 10px; max-width: 450px; }
        .btn { background: none; border: 1px solid var(--text); color: var(--text); padding: 16px; border-radius: 6px; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 10px; transition: 0.2s; text-align: left; }
        .btn:hover { background: var(--text); color: var(--bg); }
        
        .card { background: rgba(0,0,0,0.2); border: var(--border); padding: 20px; border-radius: 8px; font-family: monospace; font-size: 13px; }

        #console { margin-top: auto; background: #000; padding: 15px; border-radius: 6px; font-family: 'Consolas', monospace; font-size: 11px; color: #00ff88; border: 1px solid #333; min-height: 60px; }
        .footer { margin-top: auto; padding: 20px; text-align: center; }
        .footer a { color: var(--text); text-decoration: none; font-size: 10px; font-weight: bold; opacity: 0.5; }
    </style>
</head>
<body id="body">
    <div class="sidebar">
        <h2>ARTICH</h2>
        <button class="nav-btn active" onclick="tab('home', this)">Главное меню</button>
        <button class="nav-btn" onclick="tab('opt', this)">Оптимизация</button>
        <button class="nav-btn" onclick="tab('sys', this)">О системе</button>
        <button class="nav-btn" onclick="tab('about', this)">О программе</button>
        <button class="nav-btn" onclick="tab('settings', this)">Настройки</button>
        <div class="footer"><a href="https://t.me/orlony" target="_blank">TG: @ORLONY</a></div>
    </div>

    <div class="main">
        <div id="home" class="page active">
            <h1>Главное меню</h1>
            <p>Добро пожаловать. Все инструменты готовы.</p>
        </div>

        <div id="opt" class="page">
            <h1>Оптимизация</h1>
            <div class="btn-list">
                <button class="btn" onclick="exec('telemetry')">🛡️ Отключить телеметрию</button>
                <button class="btn" onclick="exec('clean')">🧹 Очистить временные файлы</button>
                <div style="margin: 10px 0; border-bottom: 1px solid var(--border); opacity: 0.2;"></div>
                <button class="btn" onclick="exec('act_ps')" style="color: #00ff88; border-color: #00ff88;">🚀 Активация (MAS PowerShell)</button>
                <button class="btn" onclick="exec('act_kms')">⚙️ Активация (KMS Standard)</button>
            </div>
        </div>

        <div id="sys" class="page">
            <h1>О системе</h1>
            <div class="card" id="sys-info">Загрузка данных...</div>
        </div>

        <div id="about" class="page">
            <h1>О программе</h1>
            <p>Artich Optimizer v2.8<br>Сборка с поддержкой тем и активации.</p>
        </div>

        <div id="settings" class="page">
            <h1>Настройки темы</h1>
            <div class="btn-list">
                <button class="btn" onclick="setTheme('dark')">🌑 Темная (Стандарт)</button>
                <button class="btn" onclick="setTheme('cyber')">🎆 Киберпанк</button>
                <button class="btn" onclick="setTheme('white')">⚪ Светлая</button>
            </div>
        </div>

        <div id="console">> Ожидание действий...</div>
    </div>

    <script type="text/javascript" src="/eel.js"></script>
    <script>
        window.onload = async () => {
            let d = await eel.get_sys_data()();
            document.getElementById('sys-info').innerHTML = 
                "<b>OS:</b> " + d.os + "<br><b>CPU:</b> " + d.cpu + "<br><b>RAM:</b> " + d.ram + "<br><b>DISK:</b> " + d.disk;
        };

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function setTheme(theme) {
            const b = document.getElementById('body');
            b.className = '';
            if(theme === 'cyber') b.classList.add('cyber-theme');
            if(theme === 'white') b.classList.add('white-theme');
            document.getElementById('console').innerText = "> Тема изменена на: " + theme;
        }

        async function exec(type) {
            let log = document.getElementById('console');
            log.innerText = "> Запуск: " + type + "...";
            let res = await eel.execute_task(type)();
            log.innerText = "> " + res;
        }
    </script>
</body>
</html>
